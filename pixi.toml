[workspace]
name = "bm_pirna"
description = "The purpose of this project is to analyze genes related to piRNA synthesis that were identified by screening a whole-genome library of the silkworm, with the aim of elucidating a comprehensive view of piRNA synthesis in the silkworm."
version = "0.1.0"
channels = ["conda-forge", "bioconda"]
platforms = ['linux-64']

[dependencies]
python = "~=3.10.0"
loguru = "*"
ruff = "*"
tqdm = "*"
typer = "*"
pip = "*"
ipykernel = ">=7.1.0,<8"
cutadapt = ">=5.2,<6"
fastp = ">=1.0.1,<2"
multiqc = ">=1.33,<2"
bowtie = ">=1.3.1,<2"
seqkit = ">=2.12.0,<3"
pigz = ">=2.8,<3"
samtools = ">=1.23,<2"
biopython = ">=1.86,<2"
pytz = ">=2025.2,<2026"
fastqc = ">=0.12.1,<0.13"

[pypi-dependencies]
python-dotenv = "*"
bm_pirna = { path = ".", editable = true }
